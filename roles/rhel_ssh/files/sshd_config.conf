# Managed by Ansible
# DO NOT EDIT THIS FILE BY HAND -- YOUR CHANGES WILL BE OVERWRITTEN

# Installed as /etc/ssh/sshd_config— merged with the main
# sshd_config.


# Banner and MOTD
Banner /etc/issue
PrintMotd yes
# --- Logging & connection hygiene ---
LogLevel VERBOSE
LoginGraceTime 60
MaxAuthTries 4
MaxSessions 10
SyslogFacility AUTHPRIV
ClientAliveInterval 300
ClientAliveCountMax 2

# --- Authentication (key-based preferred) ---
PermitRootLogin without-password
PermitEmptyPasswords no
PubkeyAuthentication yes
HostbasedAuthentication no
IgnoreRhosts yes

# GSSAPI authentication
GSSAPIAuthentication yes
GSSAPICleanupCredentials no

# Password logins: set no when all admins use keys (recommended). Use yes only
# during bootstrap if you must (then return to no).
PasswordAuthentication yes

# Keyboard-interactive (RFC 4256). RHEL ships this related to PAM; disabling
# reduces attack surface when not required. On RHEL 9+, prefer
# KbdInteractiveAuthentication no in addition if your OpenSSH version supports it.
ChallengeResponseAuthentication no

# PAM 
UsePAM yes
# --- Environment & forwarding (enable only where required) ---
PermitUserEnvironment no
X11Forwarding no
AllowAgentForwarding no

# Bastion / jump hosts often need AllowTcpForwarding yes.
AllowTcpForwarding yes
PermitTunnel no

# --- Optional: explicit algorithms (uncomment only if your baseline requires
#     them; wrong lists break older clients or FIPS-only hosts). RHEL 8/9
#     defaults are usually sufficient.
Ciphers aes128-ctr, aes192-ctr, aes256-ctr
# Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
# MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com
# KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,ecdh-sha2-nistp521,ecdh-sha2-nistp384,ecdh-sha2-nistp256

# sftp subsystem
Subsystem	sftp	/usr/libexec/openssh/sftp-server